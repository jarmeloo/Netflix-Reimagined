<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/favicon_inicio.webp">
</head>

<body>
    <main>
        <button id="theme-toggle" onclick="toggleTheme()"
            style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;cursor:pointer"
            aria-label="Alternar tema">

            <svg id="icon" width="28" height="28" viewBox="0 0 24 24"></svg>

        </button>
        <h1>Quem está assistindo?</h1>
        <section aria-label="Perfis disponíveis">
            <nav class="profiles">
                <ul>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/profile1.webp" alt="Imagem de Perfil padrão da Netflix 1">
                                <figcaption>Rodrigo</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/profile2.webp" alt="Imagem de Perfil padrão da Netflix 2">
                                <figcaption>Mariana</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/profile3.webp" alt="Imagem de Perfil padrão da Netflix 3">
                                <figcaption>Vinicius</figcaption>
                            </figure>
                        </a>
                    </li>
                    <li>
                        <a href="catalogo/catalogo.html" class="profile">
                            <figure>
                                <img src="assets/profile4.webp" alt="Imagem de Perfil padrão da Netflix 4">
                                <figcaption>João</figcaption>
                            </figure>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
        <div class="manage-profiles">
            <a href="#" class="manage-profiles__link">Gerenciar Perfis</a>
        </div>
    </main>
    <script src="theme.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
